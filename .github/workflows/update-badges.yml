name: Update Version Badges

on:
  push:
    paths:
      - 'src/version.rs'
    branches: [main]
  workflow_dispatch:

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Extract Sage Version
        id: sage_version
        run: |
          VERSION=$(grep 'pub const SAGE_VERSION' src/version.rs | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted Sage version: $VERSION"

      - name: Update README Badge
        run: |
          VERSION="${{ steps.sage_version.outputs.version }}"
          # Escape special characters for sed
          ESCAPED_VERSION=$(echo "$VERSION" | sed 's/[.]/\\./g; s/-/--/g')
          # Update the badge URL in README
          sed -i "s|Sage-v[0-9a-zA-Z.\-]*-blue|Sage-${ESCAPED_VERSION}-blue|g" README.md
          # Update the release link
          sed -i "s|lazear/sage/releases/tag/v[0-9a-zA-Z.\-]*|lazear/sage/releases/tag/${VERSION}|g" README.md

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "docs: Update Sage version badge to ${{ steps.sage_version.outputs.version }}"
          git push
